# docker-compose.yml
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mfdashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5435:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/mfdashboard
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'exec 3<>/dev/tcp/localhost/8080 && echo -e "GET /health/ready HTTP/1.1\nHost: localhost\n\n" >&3 && cat <&3 | grep -q "200 OK" || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10

  shell:
    build: ./shell
    ports:
      - '3000:3000'
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: mf-dashboard
      KEYCLOAK_CLIENT_ID: shell-client
      KEYCLOAK_CLIENT_SECRET: shell-secret
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      ANALYTICS_API_URL: http://mf-analytics:3001
      USERS_API_URL: http://mf-users:3002
      NODE_ENV: production
    depends_on:
      keycloak:
        condition: service_healthy

  mf-analytics:
    build: ./mf-analytics
    ports:
      - '3001:3001'
    environment:
      VITE_API_URL: http://localhost:3333
      VITE_PORT: 3001

  mf-users:
    build: ./mf-users
    ports:
      - '3002:3002'
    environment:
      VITE_API_URL: http://localhost:3333
      VITE_PORT: 3002

volumes:
  postgres_data:
